spring:
  application:
    name: interview-bank-token-generator

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:your-email@gmail.com}
    password: ${MAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # Redis used for OTP storage with TTL
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

server:
  port: 8081

app:
  jwt:
    # MUST match the main interview-bank app
    secret: ${JWT_SECRET:your-super-secret-key-minimum-256-bits-long-for-hs256-algorithm}
    issuer: interview-bank-token-generator
    # Contributor token valid for 24 h — one-time use enforced on main app side
    expiry-hours: 24

  otp:
    length: 6
    ttl-minutes: 10
    max-attempts: 5

  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5174,http://localhost:3001}

  clients:
    - id: interview-bank
      name: Interview Bank
      description: Verify your company email to receive a one-time contributor token.
      require-work-email: true
      token-ttl-hours: 24
      claims:
        role: CONTRIBUTOR

logging:
  level:
    com.tokengen: DEBUG
