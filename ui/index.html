<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contributor Token — Interview Memory Bank</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg:       #0d1117;
        --surface:  #161b22;
        --card:     #1c2230;
        --elevated: #212840;
        --border:   rgba(148,163,184,0.1);
        --accent:   rgba(148,163,184,0.16);
        --indigo:   #6366f1;
        --indigo-l: #818cf8;
        --violet:   #7c3aed;
        --emerald:  #10b981;
        --rose:     #f43f5e;
        --amber:    #f59e0b;
        --txt-1:    #e2e8f0;
        --txt-2:    #94a3b8;
        --txt-3:    #64748b;
        --r-sm:     6px;
        --r-md:     10px;
        --r-lg:     16px;
        --r-xl:     22px;
        --mono:     'DM Mono', monospace;
        --display:  'Syne', sans-serif;
        --body:     'DM Sans', sans-serif;
      }

      html { scroll-behavior: smooth; }

      body {
        font-family: var(--body);
        background: var(--bg);
        color: var(--txt-1);
        min-height: 100vh;
        font-size: 14px;
        line-height: 1.55;
        letter-spacing: -0.01em;
        -webkit-font-smoothing: antialiased;
      }

      h1, h2, h3 {
        font-family: var(--display);
        letter-spacing: -0.03em;
        line-height: 1.12;
      }

      ::-webkit-scrollbar { width: 5px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #2d3748; border-radius: 3px; }

      @keyframes spin    { to { transform: rotate(360deg); } }
      @keyframes fadeUp  { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }
      @keyframes pulse   { 0%,100%{opacity:1} 50%{opacity:0.4} }
      @keyframes shimmer { from { background-position: -200% 0; } to { background-position: 200% 0; } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
